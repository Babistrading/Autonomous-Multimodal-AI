kind = "web"
previewPath = "/"
title = "Babis M1 — AI Platform"
version = "1.0.0"
id = "artifacts/babis-m1"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21210

[services.development]
run = "pnpm --filter @workspace/babis-m1 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/babis-m1", "run", "build" ]
serve = "static"
publicDir = "artifacts/babis-m1/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21210"
BASE_PATH = "/"
