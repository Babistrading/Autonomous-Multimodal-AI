kind = "mobile"
previewPath = "/mobile/"
title = "Babis AI — Mobile"
version = "1.0.0"
id = "artifacts/babis-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 21722

[services.development]
run = "pnpm --filter @workspace/babis-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/babis-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/babis-mobile", "run", "serve" ]

[services.env]
PORT = "21722"
BASE_PATH = "/mobile/"
